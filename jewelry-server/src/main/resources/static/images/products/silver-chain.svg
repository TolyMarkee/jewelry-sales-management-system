<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/><stop offset="30%" stop-color="#f5f5f5"/><stop offset="60%" stop-color="#c0c0c0"/><stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="clasp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4d4d4"/><stop offset="100%" stop-color="#999"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#faf9f8"/>
  <!-- Chain links - oval bracelet shape -->
  <g fill="none" stroke="url(#silver)" stroke-width="7" stroke-linecap="round">
    <!-- Main bracelet oval -->
    <ellipse cx="200" cy="200" rx="110" ry="70" stroke-dasharray="10 5"/>
    <ellipse cx="200" cy="200" rx="110" ry="70" stroke-width="5" stroke-dasharray="0 10 10 5" stroke="#ddd" opacity="0.6"/>
  </g>
  <!-- Clasp -->
  <rect x="305" y="185" width="18" height="30" rx="4" fill="url(#clasp)" stroke="#888" stroke-width="1"/>
  <!-- Sparkle effects -->
  <text x="200" y="340" text-anchor="middle" font-family="serif" font-size="16" fill="#999">银质手链</text>
  <!-- Shine -->
  <circle cx="160" cy="160" r="2" fill="white" opacity="0.8"/>
  <circle cx="250" cy="170" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="140" cy="230" r="1" fill="white" opacity="0.5"/>
</svg>
